<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>
  <!-- Top server rack -->
  <rect x="5" y="7" width="22" height="8" rx="2" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <!-- Bottom server rack -->
  <rect x="5" y="17" width="22" height="8" rx="2" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <!-- Top server: label lines -->
  <line x1="8" y1="11" x2="18" y2="11" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Bottom server: label lines -->
  <line x1="8" y1="21" x2="18" y2="21" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Status LEDs -->
  <circle cx="23" cy="11" r="1.8" fill="#34d399"/>
  <circle cx="23" cy="21" r="1.8" fill="#34d399"/>
</svg>
